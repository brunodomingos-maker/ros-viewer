<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Run of Show — Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f14;--s2:#161921;--border:rgba(255,255,255,.08);--text:#e4e8f0;--muted:rgba(255,255,255,.35);--blue:#4a7cf7;--green:#3dd68c;--amber:#f5a623;--purple:#9b6bff;--cyan:#22d3ee}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:13px;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.top{height:48px;background:#0a0c10;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.logo{width:28px;height:28px;border-radius:6px;background:#c0392b;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;letter-spacing:-.5px}
.show-name{font-size:13px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{padding:2px 7px;border-radius:4px;background:rgba(155,107,255,.15);color:var(--purple);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.clock{font-family:'Courier New',monospace;font-size:15px;font-weight:700;color:var(--green);flex-shrink:0}
.tabs{height:32px;background:#0a0c10;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 10px;gap:2px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{height:26px;padding:0 14px;border-radius:5px 5px 0 0;border:1px solid transparent;border-bottom:none;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);background:none;white-space:nowrap;font-family:inherit}
.tab.active{background:var(--bg);border-color:var(--border);color:#fff}
.content{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:700px}
thead{position:sticky;top:0;z-index:10;background:#080a0e}
th{padding:6px 10px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:0;vertical-align:top;border-bottom:1px solid rgba(255,255,255,.04)}
.cell{padding:7px 10px;line-height:1.45;word-break:break-word;font-size:12px}
.num-cell{text-align:center;font-size:10px;color:var(--muted);width:32px}
.name-cell{min-width:180px;max-width:280px}
.item-name{font-weight:700;font-size:12px;color:#fff}
.item-speaker{font-size:10px;color:var(--muted);margin-top:1px}
.item-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:'Courier New',monospace}
.dept{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:800;margin:2px 1px 0}
.sec-row td{background:rgba(74,124,247,.07)}
.sec-name{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:5px 12px;color:var(--blue)}
tr.live td{background:rgba(74,124,247,.12)!important}
tr.live .item-name{color:var(--blue)}
tr.live{box-shadow:inset 3px 0 0 0 var(--blue)}
tr.done td{opacity:.35}
.dl{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.2);color:var(--green);text-decoration:none;font-size:10px;margin-left:3px;vertical-align:middle;flex-shrink:0}
.prog-wrap{height:2px;background:rgba(255,255,255,.05);border-radius:1px;margin-top:4px;overflow:hidden;display:none}
.prog-fill{height:100%;background:var(--blue);border-radius:1px;transition:width 1s linear;width:0%}
.prog-fill.over{background:var(--amber)}
tr.live .prog-wrap{display:block}
.statusbar{height:40px;background:#080a0e;border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:16px;flex-shrink:0;flex-wrap:wrap}
.sb{font-size:10px;color:var(--muted)}
.sb strong{color:var(--text);font-family:'Courier New',monospace}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);font-size:13px}
.spin{width:22px;height:22px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .hide-mob{display:none}
  .name-cell{min-width:140px;max-width:200px}
  table{min-width:400px}
}
</style>
</head>
<body>
<div id="loadView" class="loader">
  <div class="spin"></div>
  <span>A carregar show...</span>
</div>
<div class="app" id="appView" style="display:none">
  <div class="top">
    <div class="logo">ROS</div>
    <div class="show-name" id="topName">Run of Show</div>
    <div class="badge">VIEWER</div>
    <div style="width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0" id="syncDot" title="Live"></div>
    <div class="clock" id="clk">00:00:00</div>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div class="content">
    <table>
      <thead><tr>
        <th style="width:32px">#</th>
        <th style="min-width:180px">Item</th>
        <th style="width:68px">Dur.</th>
        <th style="width:64px">Start</th>
        <th style="width:110px" id="th_audio">Audio</th>
        <th style="width:90px" id="th_micro">Micro</th>
        <th style="width:75px" id="th_video" class="hide-mob">Video</th>
        <th style="width:120px" id="th_lights" class="hide-mob">Lights</th>
        <th style="width:90px" id="th_stage" class="hide-mob">Stage</th>
        <th style="width:90px" id="th_sc0" class="hide-mob">Screen 1</th>
        <th style="width:90px" id="th_sc1" class="hide-mob">Screen 2</th>
        <th style="width:90px" id="th_sc2" class="hide-mob">Screen 3</th>
        <th style="width:90px" id="th_sc3" class="hide-mob">Screen 4</th>
        <th style="min-width:140px">Notes</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="statusbar">
    <div class="pulse" id="syncDot2"></div>
    <div class="sb">Items: <strong id="stItems">0</strong></div>
    <div class="sb">Duracao: <strong id="stDur">--</strong></div>
    <div class="sb">Wrap: <strong id="stWrap">--:--</strong></div>
    <div class="sb" id="stSync" style="margin-left:auto">--</div>
  </div>
</div>

<script>
var GAS = typeof google !== 'undefined' && google.script && google.script.run;
var _show = null, days = [], currentDay = 0, rows = [], liveId = null;
var screenNames = ['Screen 1','Screen 2','Screen 3','Screen 4'];
var DEPT_COLOR = {SND:'#f5a623',LGT:'#4a7cf7',VID:'#9b6bff',CAM:'#3dd68c',STG:'#8b91a8'};
var POLL_MS = 5000;

function getShowId() {
  var inj = '<?= SHOW_ID ?>';
  if (inj && inj !== '<?= SHOW_ID ?>' && inj.trim() !== '') return inj.trim();
  var h = location.hash.replace(/^#/,'');
  if (h) {
    var hm = h.match(/(?:^|[?&])show=([^&]+)/);
    if (hm) return decodeURIComponent(hm[1]);
    if (h.indexOf('=') < 0 && h.indexOf('/') < 0) return h;
  }
  var m = location.search.match(/[?&]show=([^&]+)/);
  if (m) return decodeURIComponent(m[1]);
  return '__ask__';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDur(d){if(!d)return'--';var h=Math.floor(d/60),m=d%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':00';}
function dl(url){return url?'<a href="'+esc(url)+'" target="_blank" class="dl" title="Download">&#8659;</a>':'';}

// Deteta o cue ao vivo: 1) liveId persistido; 2) fallback = primeiro item nao concluido
function resolveLive(){
  if(liveId){ for(var i=0;i<rows.length;i++){ if(rows[i].id===liveId) return; } }
  for(var j=0;j<rows.length;j++){ if(rows[j].type==='item'&&rows[j].status!=='done'){ liveId=rows[j].id; return; } }
  liveId=null;
}

function render() {
  resolveLive();
  var body = document.getElementById('tbody');
  if (!rows.length) { body.innerHTML = '<tr><td colspan="14" style="padding:40px;text-align:center;color:var(--muted)">Sem items</td></tr>'; return; }
  var h = '', num = 0, total = 0, firstStart = null;
  var now = new Date(), nowM = now.getHours()*60+now.getMinutes()+(now.getSeconds()/60);

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    if (r.type === 'sec') {
      h += '<tr class="sec-row"><td colspan="14"><div class="sec-name" style="color:'+esc(r.color||'#4a7cf7')+'">'+esc((r.name||'').toUpperCase())+'</div></td></tr>';
      continue;
    }
    num++; total += (r.dur||0);
    if (!firstStart && r.start) firstStart = r.start;
    var isLive = liveId === r.id;
    var isDone = r.status === 'done';
    var cls = (isLive ? 'live' : '') + (isDone ? ' done' : '');

    var progHtml = '';
    if (isLive && r.start && r.dur) {
      var p = r.start.split(':');
      var sm = parseInt(p[0]||0)*60+parseInt(p[1]||0);
      var pct = Math.min(Math.max((nowM-sm)/(r.dur||1)*100,0),100);
      progHtml = '<div class="prog-wrap"><div class="prog-fill'+(pct>=100?' over':'')+'" id="pf_'+r.id+'" style="width:'+pct.toFixed(1)+'%"></div></div>';
    }

    var pills = '';
    if (r.depts && r.depts.length) r.depts.forEach(function(d){var dc=DEPT_COLOR[d]||'#888';pills+='<span class="dept" style="background:'+dc+'22;color:'+dc+'">'+d+'</span>';});

    h += '<tr class="'+cls+'" id="tr_'+r.id+'">';
    h += '<td class="num-cell"><div class="cell">'+(isLive?'&#9658;':num)+'</div></td>';
    h += '<td class="name-cell"><div class="cell"><div class="item-name">'+esc(r.name||'')+'</div>'+(r.speaker?'<div class="item-speaker">'+esc(r.speaker)+'</div>':'')+'<div class="item-meta">'+(r.start||'--:--')+' &middot; '+fmtDur(r.dur)+'</div>'+pills+progHtml+'</div></td>';
    h += '<td><div class="cell" style="font-family:Courier New,monospace;font-size:10px;color:var(--muted)">'+fmtDur(r.dur)+'</div></td>';
    h += '<td><div class="cell" style="font-family:Courier New,monospace;font-size:11px;color:var(--muted)">'+(r.start||'--:--')+'</div></td>';
    h += '<td><div class="cell" style="color:var(--amber);font-size:11px">'+esc(r.audio||'')+dl(r.audioUrl)+'</div></td>';
    h += '<td><div class="cell" style="color:var(--cyan);font-size:11px">'+esc(r.slides||'')+'</div></td>';
    h += '<td class="hide-mob"><div class="cell" style="color:var(--purple);font-size:11px">'+esc(r.video||'')+dl(r.videoUrl)+'</div></td>';
    h += '<td class="hide-mob"><div class="cell" style="color:var(--blue);font-size:11px">'+esc(r.lights||'')+'</div></td>';
    h += '<td class="hide-mob"><div class="cell" style="color:var(--green);font-size:11px">'+esc(r.furniture||'')+'</div></td>';
    for (var si = 0; si < 4; si++) {
      var st = ((r.screens||[])[si])||'', su = ((r.screenUrls||[])[si])||'';
      h += '<td class="hide-mob"><div class="cell" style="color:rgba(255,255,255,.5);font-size:11px">'+esc(st)+dl(su)+'</div></td>';
    }
    h += '<td><div class="cell" style="color:rgba(255,255,255,.45);font-size:11px">'+esc(r.notes||'')+'</div></td>';
    h += '</tr>';
  }
  body.innerHTML = h;

  document.getElementById('stItems').textContent = num;
  var h2=Math.floor(total/60),m2=total%60;
  document.getElementById('stDur').textContent = h2+'h '+String(m2).padStart(2,'0')+'m';
  if (firstStart) {
    var fp=firstStart.split(':'), fm=parseInt(fp[0]||0)*60+parseInt(fp[1]||0)+total;
    document.getElementById('stWrap').textContent = String(Math.floor(fm/60)%24).padStart(2,'0')+':'+String(fm%60).padStart(2,'0');
  }
  if (liveId) { var el=document.getElementById('tr_'+liveId); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }
  for (var si2=0; si2<4; si2++) { var th=document.getElementById('th_sc'+si2); if(th) th.textContent=screenNames[si2]; }
}

function renderTabs() {
  var bar = document.getElementById('tabBar'), h = '';
  for (var i=0; i<days.length; i++) h += '<button class="tab'+(i===currentDay?' active':'')+'" onclick="switchDay('+i+')">'+esc(days[i].label||('Day '+(i+1)))+'</button>';
  bar.innerHTML = h;
}

function switchDay(idx) { currentDay=idx; rows=days[idx].rows||[]; liveId=null; renderTabs(); render(); }

function parseData(res) {
  if (!res.ok) return;
  try {
    var parsed = res.data ? JSON.parse(res.data) : [];
    if (parsed && parsed.days) {
      days = parsed.days;
      if (parsed.screenNames && parsed.screenNames.length===4) screenNames = parsed.screenNames;
      if (parsed.currentDay !== undefined && parsed.currentDay < days.length) currentDay = parsed.currentDay;
      if (!days[currentDay]) currentDay = 0;
      rows = days[currentDay].rows || [];
      liveId = (parsed.liveId !== undefined) ? parsed.liveId : null;
    } else if (Array.isArray(parsed) && parsed.length && parsed[0].rows) {
      days = parsed; rows = days[currentDay] ? days[currentDay].rows||[] : []; liveId = null;
    } else if (Array.isArray(parsed)) {
      days = [{id:'d1',label:'Day 1',rows:parsed}]; rows = parsed; liveId = null;
    }
  } catch(e) { rows = []; }
}

function load() {
  if (!GAS || !_show) return;
  google.script.run
    .withSuccessHandler(function(res) {
      document.getElementById('loadView').style.display = 'none';
      document.getElementById('appView').style.display = 'flex';
      parseData(res);
      renderTabs(); render();
      setInterval(poll, POLL_MS);
    })
    .withFailureHandler(function(e) {
      document.getElementById('loadView').innerHTML = '<div style="color:#f05252;font-size:13px;text-align:center;padding:40px">Erro ao carregar.<br><small>'+e.message+'</small></div>';
    })
    .loadRows(_show);

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.ok && res.name) {
        document.getElementById('topName').textContent = res.name + (res.date?' — '+res.date:'');
        document.title = res.name + ' — Viewer';
      }
    })
    .withFailureHandler(function(){})
    .loadEventMeta(_show);
}

function poll() {
  if (!GAS || !_show) return;
  var dot = document.getElementById('syncDot2');
  if (dot) dot.style.background = 'var(--amber)';
  google.script.run
    .withSuccessHandler(function(res) {
      if (dot) dot.style.background = 'var(--green)';
      document.getElementById('stSync').textContent = 'Sync ' + new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      var oldLive = liveId;
      parseData(res);
      render();
      if (liveId && liveId !== oldLive) { var el=document.getElementById('tr_'+liveId); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }
    })
    .withFailureHandler(function() { if(dot) dot.style.background='#f05252'; })
    .loadRows(_show);
}

setInterval(function() {
  var now = new Date();
  document.getElementById('clk').textContent = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  if (liveId) {
    var r = null;
    for(var i=0;i<rows.length;i++){if(rows[i].id===liveId){r=rows[i];break;}}
    if (r && r.start && r.dur) {
      var p=r.start.split(':'), sm=parseInt(p[0]||0)*60+parseInt(p[1]||0);
      var nowM=now.getHours()*60+now.getMinutes()+(now.getSeconds()/60);
      var pct=Math.min(Math.max((nowM-sm)/(r.dur||1)*100,0),100);
      var pf=document.getElementById('pf_'+r.id);
      if(pf){ pf.style.width=pct.toFixed(1)+'%'; pf.className='prog-fill'+(pct>=100?' over':''); }
    }
  }
}, 1000);

window.addEventListener('load', function() {
  var sid = getShowId();
  if (!GAS) {
    document.getElementById('loadView').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Abre via URL do deploy GAS.</div>';
    return;
  }
  if (sid === '__ask__') {
    google.script.run
      .withSuccessHandler(function(activeShow) {
        if (activeShow) { _show = activeShow; load(); }
        else { document.getElementById('loadView').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Sem ID de show no URL.<br><small>Pede o link correto ao show caller.</small></div>'; }
      })
      .withFailureHandler(function() {
        document.getElementById('loadView').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Erro ao carregar.<br><small>Verifica a ligacao.</small></div>';
      })
      .getActiveShow();
    return;
  }
  if (!sid) {
    document.getElementById('loadView').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Sem ID de show no URL.<br><small>Pede o link correto ao show caller.</small></div>';
    return;
  }
  _show = sid;
  load();
});
</script>
</body>
</html>
