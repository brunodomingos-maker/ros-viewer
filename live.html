<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Run of Show — Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f7f8fc;--border:rgba(30,40,100,0.12);--text:#0f1235;--muted:#4a5280;--blue:#4361ee;--green:#2ec97e;--amber:#f0960a;--red:#e63946}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:15px;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.top{height:54px;background:#fff;border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;box-shadow:0 1px 8px rgba(30,40,100,.06)}
.logo{width:32px;height:32px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.show-name{font-size:15px;font-weight:800;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{padding:3px 9px;border-radius:5px;background:#e8fdf3;border:1px solid #a8e6c8;color:#1a7a4a;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
.timers{display:flex;align-items:center;gap:16px;flex-shrink:0}
.timer-block{text-align:center}
.timer-val{font-family:'Courier New',monospace;font-size:16px;font-weight:800;line-height:1;color:var(--green)}
.timer-val.white{color:var(--text)}
.timer-val.amber{color:var(--amber)}
.timer-val.overtime{color:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.timer-lbl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600}
.timer-sep{width:1px;height:28px;background:var(--border)}
.modebar{background:#fff;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:6px;padding:8px 12px;flex-wrap:wrap;flex-shrink:0}
.mpill{height:30px;padding:0 14px;border-radius:99px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.mpill.active{background:var(--blue);border-color:var(--blue);color:#fff}
.dpill{height:30px;padding:0 13px;border-radius:99px;border:1.5px solid;background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.mdiv{width:1px;height:22px;background:var(--border);margin:0 3px}
.toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600;cursor:pointer;user-select:none;margin-left:4px}
.tgl{width:34px;height:20px;border-radius:99px;background:#cfd4e8;position:relative;transition:background .15s;flex-shrink:0}
.tgl.on{background:var(--blue)}
.tgl::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s}
.tgl.on::after{left:16px}
.tablectrls{display:flex;align-items:center;gap:8px}
.tb-btn{height:28px;padding:0 12px;border-radius:7px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.tb-btn:hover{border-color:var(--blue);color:var(--blue)}
.zoom-val{font-family:'Courier New',monospace;font-size:12px;font-weight:700;color:var(--muted);min-width:38px;text-align:center}
.col-wrap{position:relative}
.col-dd{position:absolute;top:34px;right:0;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:6px;min-width:180px;z-index:200;box-shadow:0 8px 32px rgba(30,40,100,0.12);display:none}
.col-dd.open{display:block}
.cp-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);user-select:none}
.cp-item:hover{background:#f0f4ff}
.cp-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--blue);font-weight:800;flex-shrink:0}
.cp-chk.on{background:var(--blue);border-color:var(--blue);color:#fff}
.tabs{height:36px;background:#fff;border-bottom:1.5px solid var(--border);display:flex;align-items:flex-end;padding:0 12px;gap:3px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{height:30px;padding:0 16px;border-radius:6px 6px 0 0;border:1.5px solid transparent;border-bottom:none;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);background:none;font-family:inherit;white-space:nowrap}
.tab.active{background:#fff;border-color:var(--border);color:var(--blue);font-weight:700}
.content{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;table-layout:auto}
thead{position:sticky;top:0;z-index:10;background:#f0f2f9}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid rgba(30,40,100,.15);white-space:nowrap}
td{padding:0;vertical-align:top;border-bottom:1px solid rgba(30,40,100,.07)}
.cell{padding:9px 10px;line-height:1.5;word-break:break-word}
.item-name{font-weight:800;color:var(--text)}
.item-speaker{color:var(--muted);margin-top:2px}
.sec-row td{background:#f0f4ff}
.sec-name{font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:7px 12px;color:var(--blue)}
.live-row td{background:rgba(67,97,238,.10)!important;border-left:4px solid var(--blue)}
.live-row .item-name{color:var(--blue)}
.done-row td{opacity:.4}
.prog-bar{height:6px;background:rgba(30,40,100,.08);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:99px;transition:width 1s linear}
.cards{max-width:760px;margin:0 auto;padding:14px}
.clabel{font-size:12px;font-weight:800;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin:0 2px 7px}
.card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:16px}
.now{border:2px solid var(--blue)}
.numbadge{flex-shrink:0;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.tag{font-size:11px;font-weight:800;padding:2px 9px;border-radius:99px;white-space:nowrap}
.tag-keep{font-size:11px;font-weight:700;color:var(--muted)}
.statusbar{height:40px;background:#fff;border-top:1.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;box-shadow:0 -1px 8px rgba(30,40,100,.05)}
.sb{font-size:12px;color:var(--muted);font-weight:600}
.sb strong{color:var(--text);font-family:'Courier New',monospace;font-weight:800}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--muted);font-size:14px;text-align:center;padding:20px}
.spin{width:26px;height:26px;border:2.5px solid rgba(30,40,100,.15);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.hide-mob{display:none}.timers{gap:10px}.timer-val{font-size:14px}.cards{padding:10px}}
.flash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .25s;z-index:9999;padding:20px}
.flash.show{opacity:1}
.flash span{background:rgba(15,18,53,.96);color:#fff;padding:30px 56px;border-radius:20px;font-size:42px;font-weight:900;letter-spacing:.01em;text-align:center;max-width:92vw;box-shadow:0 16px 70px rgba(0,0,0,.45);animation:flashpop .25s ease-out}
@keyframes flashpop{from{transform:scale(.85)}to{transform:scale(1)}}
@media(max-width:600px){.flash span{font-size:30px;padding:24px 36px}}
</style>
</head>
<body>
<div id="loadView" class="loader">
  <div class="spin"></div>
  <span id="loadMsg">A carregar...</span>
</div>
<div class="app" id="appView" style="display:none">
  <div class="top">
    <div class="logo">ROS</div>
    <div class="show-name" id="topName">Run of Show</div>
    <div class="badge">LIVE</div>
    <div class="sync-dot" id="dot"></div>
    <div class="timers">
      <div class="timer-block">
        <div class="timer-val green" id="clkItem">00:00:00</div>
        <div class="timer-lbl">Item</div>
      </div>
      <div class="timer-sep"></div>
      <div class="timer-block">
        <div class="timer-val white" id="clkTod">00:00:00</div>
        <div class="timer-lbl">Hora</div>
      </div>
    </div>
  </div>
  <div class="modebar">
    <div id="pillbar" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"></div>
    <div style="flex:1"></div>
    <div class="tablectrls" id="tablectrls">
      <button class="tb-btn" onclick="zoomOut()">&minus;</button>
      <div class="zoom-val" id="zoomVal">100%</div>
      <button class="tb-btn" onclick="zoomIn()">+</button>
      <div class="col-wrap">
        <button class="tb-btn" onclick="toggleColDd(event)">Colunas &#9662;</button>
        <div class="col-dd" id="colDd">
          <div class="cp-item" onclick="toggleCol('dur')"><div class="cp-chk on" id="chk-dur">&#10003;</div>Dur.</div>
          <div class="cp-item" onclick="toggleCol('start')"><div class="cp-chk on" id="chk-start">&#10003;</div>Start</div>
          <div class="cp-item" onclick="toggleCol('audio')"><div class="cp-chk on" id="chk-audio">&#10003;</div>Audio</div>
          <div class="cp-item" onclick="toggleCol('video')"><div class="cp-chk on" id="chk-video">&#10003;</div>Video</div>
          <div class="cp-item" onclick="toggleCol('lights')"><div class="cp-chk on" id="chk-lights">&#10003;</div>Iluminacao</div>
          <div class="cp-item" onclick="toggleCol('furniture')"><div class="cp-chk on" id="chk-furniture">&#10003;</div>Palco</div>
          <div class="cp-item" onclick="toggleCol('notes')"><div class="cp-chk on" id="chk-notes">&#10003;</div>Notas</div>
        </div>
      </div>
    </div>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div class="content" id="content">
    <div id="tableWrap">
      <table id="rosTable">
        <thead><tr>
          <th style="width:36px;text-align:center">#</th>
          <th style="min-width:220px">Item</th>
          <th class="col-dur" style="min-width:60px">Dur.</th>
          <th class="col-start" style="min-width:68px">Start</th>
          <th class="col-audio hide-mob" style="min-width:100px">Audio</th>
          <th class="col-video hide-mob" style="min-width:80px">Video</th>
          <th class="col-lights hide-mob" style="min-width:100px">Iluminacao</th>
          <th class="col-furniture hide-mob" style="min-width:90px">Palco</th>
          <th class="col-notes" style="min-width:140px">Notas</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="cardWrap" style="display:none"></div>
  </div>
  <div class="statusbar">
    <div class="sb">Items: <strong id="stN">0</strong></div>
    <div class="sb">Wrap: <strong id="stW">--:--</strong></div>
    <div class="sb" style="margin-left:auto" id="stSync"></div>
  </div>
</div>

<div class="flash" id="flashEl"><span id="flashTxt"></span></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ── CONFIG FIREBASE ──────────────────────────────────────────────────────────
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyBobzfTXIdHthrVTT7ouBZqQN6YUHQdScA",
  authDomain: "rosrise-46f05.firebaseapp.com",
  databaseURL: "https://rosrise-46f05-default-rtdb.firebaseio.com",
  projectId: "rosrise-46f05"
};

var GAS_URL = '', SHOW_ID = '';
var rows = [], days = [], currentDay = 0, liveCue = null, liveItemStart = null;
var firstLoad = true, tableZoom = 100, _lastDataVer = null, _rt = false;
var _lastSeq = -1, _pollTimer = null, _fbConnected = false, _offlineSince = 0, _heartbeat = null;
var _lastMsgTs = 0;
var POLL_MS = 3000, FALLBACK_AFTER_MS = 8000;
var colVis = { dur: true, start: true, audio: true, video: true, lights: true, furniture: true, notes: true };
var ZOOM_STEPS = [70, 80, 90, 100, 110, 120, 130, 150, 175, 200];

// ── MODOS DE VISTA ───────────────────────────────────────────────────────────
var viewMode = 'caller';     // 'table' | 'caller' | 'role'
var selDepts = [];           // funcoes selecionadas na vista por funcao
var onlyMine = false;        // filtro: so cues onde os meus departamentos agem

var DEPTS = [
  {k:'som',   label:'Som',   field:'audio',     ac:'#BA7517', dk:'#854F0B', cb:'#FAEEDA', ct:'#633806'},
  {k:'micro', label:'Micro', field:'slides',    ac:'#0F6E56', dk:'#085041', cb:'#E1F5EE', ct:'#04342C'},
  {k:'video', label:'Vídeo', field:'video',     ac:'#534AB7', dk:'#3C3489', cb:'#EEEDFE', ct:'#26215C'},
  {k:'luz',   label:'Luz',   field:'lights',    ac:'#185FA5', dk:'#0C447C', cb:'#E6F1FB', ct:'#042C53'},
  {k:'palco', label:'Palco', field:'furniture', ac:'#5F5E5A', dk:'#444441', cb:'#F1EFE8', ct:'#2C2C2A'},
  {k:'ecras', label:'Ecrãs', field:'_screens',  ac:'#993C1D', dk:'#712B13', cb:'#FAECE7', ct:'#4A1B0C'}
];
var CODEMAP = {
  SND:{cb:'#FAEEDA',ct:'#633806'}, LGT:{cb:'#E6F1FB',ct:'#042C53'},
  VID:{cb:'#EEEDFE',ct:'#26215C'}, CAM:{cb:'#E1F5EE',ct:'#04342C'}, STG:{cb:'#F1EFE8',ct:'#2C2C2A'}
};
function deptByKey(k){ for(var i=0;i<DEPTS.length;i++)if(DEPTS[i].k===k)return DEPTS[i]; return null; }

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDur(d){if(!d)return'--';var h=Math.floor(d/60),m=d%60;return(h>0?h+'h':'')+String(m).padStart(h>0?2:1,'0')+'m';}

function getParams(){
  var p={};
  [location.search.replace(/^[?]/,''),location.hash.replace(/^#/,'')].forEach(function(s){
    if(!s)return;
    s.split('&').forEach(function(kv){
      var idx=kv.indexOf('=');if(idx<0)return;
      p[decodeURIComponent(kv.substring(0,idx))]=decodeURIComponent(kv.substring(idx+1));
    });
  });
  return p;
}

// ── ZOOM (vista tabela) ──────────────────────────────────────────────────────
function applyZoom(){
  var scale=tableZoom/100;
  var wrap=document.getElementById('tableWrap'),table=document.getElementById('rosTable');
  if(wrap&&table){
    table.style.transformOrigin='top left';
    table.style.transform='scale('+scale+')';
    table.style.width=(100/scale)+'%';
    wrap.style.overflowX=scale<1?'hidden':'auto';
  }
  var zv=document.getElementById('zoomVal');if(zv)zv.textContent=tableZoom+'%';
}
function zoomIn(){var nx=null;for(var i=0;i<ZOOM_STEPS.length;i++){if(ZOOM_STEPS[i]>tableZoom){nx=ZOOM_STEPS[i];break;}}if(nx){tableZoom=nx;applyZoom();}}
function zoomOut(){var pv=null;for(var i=ZOOM_STEPS.length-1;i>=0;i--){if(ZOOM_STEPS[i]<tableZoom){pv=ZOOM_STEPS[i];break;}}if(pv){tableZoom=pv;applyZoom();}}

function toggleColDd(e){if(e)e.stopPropagation();document.getElementById('colDd').classList.toggle('open');}
document.addEventListener('click',function(e){if(!e.target.closest('.col-wrap')){var d=document.getElementById('colDd');if(d)d.classList.remove('open');}});
function toggleCol(name){
  colVis[name]=!colVis[name];
  var chk=document.getElementById('chk-'+name);
  if(chk){chk.classList.toggle('on',colVis[name]);chk.textContent=colVis[name]?'\u2713':'';}
  applyColVis();
}
function applyColVis(){
  var keys=Object.keys(colVis);
  for(var k=0;k<keys.length;k++){
    var els=document.querySelectorAll('.col-'+keys[k]);
    for(var e=0;e<els.length;e++)els[e].style.display=colVis[keys[k]]?'':'none';
  }
}

// ── SELETOR DE MODO ──────────────────────────────────────────────────────────
function setMode(m){ viewMode=m; if(m!=='role')selDepts=[]; render(); }
function toggleDept(k){
  var i=selDepts.indexOf(k);
  if(i>=0)selDepts.splice(i,1); else { if(selDepts.length>=3)selDepts.shift(); selDepts.push(k); }
  viewMode=selDepts.length?'role':'caller';
  render();
}
function toggleOnlyMine(){ onlyMine=!onlyMine; render(); }

function renderPillbar(){
  var h='';
  h+='<button class="mpill'+(viewMode==='table'?' active':'')+'" onclick="setMode(\'table\')">Tabela</button>';
  h+='<button class="mpill'+(viewMode==='caller'?' active':'')+'" onclick="setMode(\'caller\')">Show caller</button>';
  h+='<span class="mdiv"></span>';
  DEPTS.forEach(function(d){
    var on=selDepts.indexOf(d.k)>=0;
    var st=on?('background:'+d.ac+';border-color:'+d.ac+';color:#fff'):('color:'+d.dk+';border-color:'+d.cb);
    h+='<button class="dpill" style="'+st+'" onclick="toggleDept(\''+d.k+'\')">'+d.label+'</button>';
  });
  h+='<label class="toggle" onclick="toggleOnlyMine()" style="'+(viewMode==='role'?'':'display:none')+'"><span class="tgl'+(onlyMine?' on':'')+'"></span>só as minhas</label>';
  document.getElementById('pillbar').innerHTML=h;
}

// ── MENSAGENS DO SHOW CALLER (flash no ecra) ─────────────────────────────────
function showFlash(text){
  if(!text)return;
  var el=document.getElementById('flashEl'),txt=document.getElementById('flashTxt');
  if(!el||!txt)return;
  txt.textContent=text;
  el.classList.add('show');
  clearTimeout(window._flashT);
  window._flashT=setTimeout(function(){el.classList.remove('show');},4500);
}

// ── INDICADOR DE SINCRONIZACAO ───────────────────────────────────────────────
function setSync(state, extra){
  var dot=document.getElementById('dot');
  var lbl=document.getElementById('stSync');
  var color=state==='live'?'var(--green)':state==='fallback'?'var(--amber)':'var(--red)';
  if(dot)dot.style.background=color;
  if(lbl){
    var txt=state==='live'?'tempo real':state==='fallback'?'polling (Firebase offline)':'sem ligacao';
    lbl.textContent=txt+(extra?' \u00b7 '+extra:'');
  }
}

// ── CARGA INICIAL DOS DADOS (uma vez, do GAS via JSONP) ──────────────────────
function fetchData(){
  if(!GAS_URL||!SHOW_ID)return;
  var cbName='_cb_'+Date.now();
  var url=GAS_URL+'?action=getData&show='+encodeURIComponent(SHOW_ID)+'&callback='+cbName+'&t='+Date.now();
  window[cbName]=function(data){
    try{delete window[cbName];}catch(e){}
    if(data&&data.ok)processData(data);
    else if(firstLoad)document.getElementById('loadMsg').textContent='Sem dados.';
  };
  var s=document.createElement('script');
  s.onerror=function(){try{delete window[cbName];}catch(e){}if(firstLoad)document.getElementById('loadMsg').textContent='Erro ao ligar.';};
  s.src=url;
  document.head.appendChild(s);
}

function processData(data){
  try{
    var parsed=data.data?JSON.parse(data.data):null;
    if(!parsed)return;
    if(parsed.days&&parsed.days.length){
      days=parsed.days;
      if(!days[currentDay])currentDay=0;
      rows=days[currentDay].rows||[];
      var useGetDataLive=(!_rt||_pollTimer);
      if(useGetDataLive){
        var newCue=data.liveCue||null;
        if(newCue&&newCue!==liveCue)liveItemStart=Date.now();
        else if(!newCue)liveItemStart=null;
        liveCue=newCue;
        if(data.liveDay!==undefined&&data.liveDay!==null&&days[data.liveDay])currentDay=parseInt(data.liveDay);
        rows=days[currentDay].rows||[];
      }
      if(data.ver!==undefined)_lastDataVer=data.ver;
      var name=parsed.name||(parsed.evtData&&parsed.evtData.name)||'';
      if(name)document.getElementById('topName').textContent=name;
    } else if(Array.isArray(parsed)&&parsed.length){
      days=[{id:'d1',label:'Dia 1',rows:parsed}];rows=parsed;
    }
    if(firstLoad){
      document.getElementById('loadView').style.display='none';
      document.getElementById('appView').style.display='flex';
      firstLoad=false;
      applyZoom();applyColVis();
    }
    renderTabs();render();updateStats();
  }catch(e){
    if(firstLoad)document.getElementById('loadMsg').textContent='Erro: '+e.message;
  }
}

// ── TEMPO REAL: cue ao vivo (Firebase) + auto-recuperacao ────────────────────
function startRealtime(){
  var hasFb=(typeof firebase!=='undefined')&&FIREBASE_CONFIG.databaseURL.indexOf('SUBSTITUI')<0;
  if(hasFb){
    try{
      if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
      firebase.database().ref('.info/connected').on('value',function(s){
        _fbConnected=(s.val()===true);
        if(_fbConnected){_offlineSince=0;stopFallbackPolling();setSync('live');}
        else{if(!_offlineSince)_offlineSince=Date.now();setSync('disconnected');}
      });
      var ref=firebase.database().ref('shows/'+SHOW_ID+'/live');
      ref.on('value',function(snap){
        var v=snap.val();
        if(v)applyLive(v);
      },function(){setSync('disconnected');startFallbackPolling();});
      var _msgFirst=true;
      var msgRef=firebase.database().ref('shows/'+SHOW_ID+'/live/msg');
      msgRef.on('value',function(snap){
        var m=snap.val();
        if(!m||!m.ts)return;
        if(_msgFirst){
          _msgFirst=false;_lastMsgTs=m.ts;
          if(Date.now()-m.ts<10000)showFlash(m.text||'');
          return;
        }
        if(m.ts<=_lastMsgTs)return;
        _lastMsgTs=m.ts;
        showFlash(m.text||'');
      });
      _rt=true;
      _heartbeat=setInterval(function(){
        if(!_fbConnected&&_offlineSince&&(Date.now()-_offlineSince)>FALLBACK_AFTER_MS)startFallbackPolling();
      },2000);
      return;
    }catch(e){}
  }
  startFallbackPolling();
}

function applyLive(v){
  if(typeof v.seq==='number'){
    if(v.seq<=_lastSeq)return;
    _lastSeq=v.seq;
  }
  if(v.liveCue!==liveCue){liveItemStart=Date.now();liveCue=v.liveCue||null;}
  if(v.liveDay!==undefined&&v.liveDay!==null&&parseInt(v.liveDay)!==currentDay&&days[parseInt(v.liveDay)]){
    currentDay=parseInt(v.liveDay);rows=days[currentDay].rows||[];renderTabs();
  }
  if(v.dataVer&&v.dataVer!==_lastDataVer){_lastDataVer=v.dataVer;fetchData();}
  if(_fbConnected)setSync('live',new Date().toLocaleTimeString('pt-PT'));
  render();updateStats();
}

function startFallbackPolling(){
  if(_pollTimer)return;
  setSync('fallback');
  _pollTimer=setInterval(fetchData,POLL_MS);
  fetchData();
}
function stopFallbackPolling(){
  if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}
}

function renderTabs(){
  var bar=document.getElementById('tabBar');
  if(days.length<=1){bar.innerHTML='';return;}
  var h='';
  for(var i=0;i<days.length;i++)
    h+='<button class="tab'+(i===currentDay?' active':'')+'" onclick="switchDay('+i+')">'+(days[i].label||'Dia '+(i+1))+'</button>';
  bar.innerHTML=h;
}
function switchDay(idx){currentDay=idx;rows=days[idx].rows||[];renderTabs();render();updateStats();}

// ── HELPERS DE DADOS ─────────────────────────────────────────────────────────
function itemsList(){ return rows.filter(function(r){return r.type==='item';}); }
function liveIndexIn(items){ if(!liveCue)return -1; for(var i=0;i<items.length;i++)if(items[i].id===liveCue)return i; return -1; }
function rowIndexOf(id){ for(var i=0;i<rows.length;i++)if(rows[i].id===id)return i; return -1; }
function actionOf(it,d){ if(d.field==='_screens')return (it.screens||[]).filter(Boolean).join(' · '); return String(it[d.field]||'').trim(); }
function secColorMap(){ var m={},c='#4361ee'; rows.forEach(function(r){ if(r.type==='sec')c=r.color||'#4361ee'; else m[r.id]=c; }); return m; }
function roleStates(items,d){ var out={},prev=''; items.forEach(function(it){ var a=actionOf(it,d),st; if(!a)st='none'; else if(a!==prev){st='muda';prev=a;} else st='keep'; out[it.id]={action:a,state:st}; }); return out; }
function codeChips(depts){ if(!depts||!depts.length)return ''; return depts.map(function(c){ var m=CODEMAP[c]||{cb:'#eef0f6',ct:'#444'}; return '<span class="tag" style="background:'+m.cb+';color:'+m.ct+'">'+esc(c)+'</span>'; }).join(''); }
function nowPct(it){ if(it&&it.id===liveCue&&liveItemStart&&it.dur)return Math.min((Date.now()-liveItemStart)/1000/((it.dur||1)*60)*100,100).toFixed(1); return 0; }

// ── RENDER DISPATCHER ────────────────────────────────────────────────────────
function render(){
  renderPillbar();
  var tableMode=(viewMode==='table');
  document.getElementById('tableWrap').style.display=tableMode?'':'none';
  document.getElementById('cardWrap').style.display=tableMode?'none':'';
  document.getElementById('tablectrls').style.display=tableMode?'flex':'none';
  if(tableMode){ renderTable(); applyZoom(); applyColVis(); }
  else if(viewMode==='caller') renderCaller();
  else renderRole();
}

// ── VISTA TABELA ─────────────────────────────────────────────────────────────
function renderTable(){
  var body=document.getElementById('tbody');
  if(!rows.length){body.innerHTML='<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--muted)">Sem items</td></tr>';return;}
  var now=new Date(),nowM=now.getHours()*60+now.getMinutes()+(now.getSeconds()/60);
  var h='',num=0;
  rows.forEach(function(r){
    if(r.type==='sec'){
      h+='<tr class="sec-row"><td colspan="9"><div class="sec-name" style="color:'+esc(r.color||'#4361ee')+'">'+esc((r.name||'').toUpperCase())+'</div></td></tr>';
      return;
    }
    num++;
    var isLive=liveCue&&r.id===liveCue;
    var sm=0,isDone=false;
    if(r.start){var p=r.start.split(':');sm=parseInt(p[0]||0)*60+parseInt(p[1]||0);isDone=nowM>=sm+(r.dur||0)&&r.dur>0&&!isLive;}
    var pct=isLive&&liveItemStart&&r.dur?Math.min((Date.now()-liveItemStart)/1000/((r.dur||1)*60)*100,100):0;
    var prog=isLive?'<div class="prog-bar" style="margin-top:6px"><div class="prog-fill" id="pf_'+r.id+'" style="width:'+pct.toFixed(1)+'%"></div></div>':'';
    var cls=isLive?'live-row':isDone?'done-row':'';
    h+='<tr class="'+cls+'" id="tr_'+r.id+'">';
    h+='<td><div class="cell" style="text-align:center;color:var(--muted)">'+(isLive?'&#9658;':num)+'</div></td>';
    h+='<td><div class="cell"><div class="item-name">'+esc(r.name||'')+'</div>'+(r.speaker?'<div class="item-speaker">'+esc(r.speaker)+'</div>':'')+prog+'</div></td>';
    h+='<td class="col-dur"><div class="cell" style="font-family:Courier New,monospace;color:var(--muted)">'+fmtDur(r.dur)+'</div></td>';
    h+='<td class="col-start"><div class="cell" style="font-family:Courier New,monospace;color:var(--muted)">'+(r.start||'')+'</div></td>';
    h+='<td class="col-audio hide-mob"><div class="cell" style="color:#c07a00">'+esc(r.audio||'')+'</div></td>';
    h+='<td class="col-video hide-mob"><div class="cell" style="color:#6d28d9">'+esc(r.video||'')+'</div></td>';
    h+='<td class="col-lights hide-mob"><div class="cell" style="color:#2d4fd6">'+esc(r.lights||'')+'</div></td>';
    h+='<td class="col-furniture hide-mob"><div class="cell" style="color:#1a7a4a">'+esc(r.furniture||'')+'</div></td>';
    h+='<td class="col-notes"><div class="cell" style="color:var(--muted)">'+esc(r.notes||'')+'</div></td>';
    h+='</tr>';
  });
  body.innerHTML=h;
  if(liveCue){var el=document.getElementById('tr_'+liveCue);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
}

// ── VISTA SHOW CALLER ────────────────────────────────────────────────────────
function infoPairs(it){
  var src=[['Áudio',it.audio],['Micro',it.slides],['Vídeo',it.video],['Luz',it.lights],['Palco',it.furniture],['Ecrãs',(it.screens||[]).filter(Boolean).join(' · ')]];
  return src.filter(function(p){return p[1]&&String(p[1]).trim();});
}
function ctxLine(it,num){
  return '<div style="font-size:12px;font-weight:800;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin-bottom:6px">A decorrer · Cue '+num+' · '+esc(it.name||'')+' · '+(it.start||'--:--')+' · <span id="now_rem">falta '+fmtDur(it.dur)+'</span></div>';
}
function renderCaller(){
  var items=itemsList();
  if(!items.length){document.getElementById('cardWrap').innerHTML='<div class="cards"><div class="card" style="text-align:center;color:var(--muted)">Sem items neste dia.</div></div>';return;}
  var sc=secColorMap();
  var li=liveIndexIn(items);
  var nowIt=li>=0?items[li]:null;
  var nextIt=li>=0?items[li+1]:items[0];
  var nowNum=li>=0?li+1:0;
  var h='<div class="cards">';

  h+='<div class="clabel">A decorrer</div>';
  if(nowIt){
    var acc=sc[nowIt.id]||'#4361ee';
    var info=infoPairs(nowIt).map(function(p){return '<div style="min-width:120px;flex:1"><div style="font-size:11px;color:var(--muted)">'+p[0]+'</div><div style="font-size:15px;font-weight:700">'+esc(p[1])+'</div></div>';}).join('');
    h+='<div class="card now" style="border-left:6px solid '+acc+'">';
    h+='<div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start">';
    h+='<div style="display:flex;gap:13px;align-items:flex-start;min-width:0">';
    h+='<div class="numbadge" style="background:'+acc+'1a;color:'+acc+'">'+nowNum+'</div>';
    h+='<div style="min-width:0"><div style="font-size:26px;font-weight:800;line-height:1.15">'+esc(nowIt.name||'')+'</div>'+(nowIt.speaker?'<div style="font-size:14px;color:var(--muted);margin-top:2px">'+esc(nowIt.speaker)+'</div>':'')+'</div>';
    h+='</div>';
    h+='<div style="text-align:right;flex-shrink:0;font-family:Courier New,monospace"><div style="font-size:22px;font-weight:800">'+(nowIt.start||'--:--')+'</div><div style="font-size:13px;color:var(--muted)">'+fmtDur(nowIt.dur)+'</div></div>';
    h+='</div>';
    h+='<div class="prog-bar" style="margin:14px 0 4px"><div class="prog-fill" id="pf_live" style="width:'+nowPct(nowIt)+'%"></div></div>';
    h+='<div style="text-align:right;font-size:12px;color:var(--muted);font-family:Courier New,monospace"><span id="now_rem">falta '+fmtDur(nowIt.dur)+'</span></div>';
    var chips=codeChips(nowIt.depts);
    if(chips)h+='<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">'+chips+'</div>';
    if(info)h+='<div style="display:flex;flex-wrap:wrap;gap:12px;border-top:1px solid var(--border);margin-top:12px;padding-top:12px">'+info+'</div>';
    h+='</div>';
  } else {
    h+='<div class="card" style="text-align:center;color:var(--muted);padding:22px">À espera do início do show.</div>';
  }

  if(nextIt){
    var accn=sc[nextIt.id]||'#4361ee';
    h+='<div class="clabel">A seguir</div>';
    h+='<div class="card" style="border-left:6px solid '+accn+';display:flex;align-items:center;justify-content:space-between;gap:14px">';
    h+='<div style="min-width:0"><div style="font-size:18px;font-weight:800">'+esc(nextIt.name||'')+'</div>';
    var ch2=codeChips(nextIt.depts);
    if(ch2)h+='<div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap">'+ch2+'</div>';
    h+='</div>';
    h+='<div style="text-align:right;flex-shrink:0;font-family:Courier New,monospace"><div style="font-size:18px;font-weight:800">'+(nextIt.start||'--:--')+'</div><div style="font-size:12px;color:var(--muted)">'+fmtDur(nextIt.dur)+'</div></div>';
    h+='</div>';
  }

  h+='<div class="clabel">Próximas</div>';
  h+=upcomingCaller(nextIt,sc);
  h+='</div>';
  document.getElementById('cardWrap').innerHTML=h;
}

function upcomingCaller(afterIt,sc){
  if(!afterIt)return '<div style="color:var(--muted);font-size:13px;padding:6px 2px">Fim do alinhamento.</div>';
  var start=rowIndexOf(afterIt.id);
  var h='',count=0;
  for(var i=start+1;i<rows.length;i++){
    var r=rows[i];
    if(r.type==='sec'){h+='<div style="font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:'+esc(r.color||'#4361ee')+';margin:12px 2px 5px">'+esc(r.name||'')+'</div>';continue;}
    count++;
    var acc=sc[r.id]||'#4361ee';
    h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-left:4px solid '+acc+';background:#fff;border-bottom:1px solid var(--border)">';
    h+='<span style="font-size:13px;font-family:Courier New,monospace;color:var(--muted);width:42px;flex-shrink:0">'+(r.start||'--:--')+'</span>';
    h+='<span style="font-size:15px;font-weight:700;flex:1;min-width:0">'+esc(r.name||'')+'</span>';
    h+=codeChips(r.depts);
    h+='<span style="font-size:12px;font-family:Courier New,monospace;color:var(--muted);width:42px;text-align:right">'+fmtDur(r.dur)+'</span>';
    h+='</div>';
  }
  if(!count)h+='<div style="color:var(--muted);font-size:13px;padding:6px 2px">Fim do alinhamento.</div>';
  return h;
}

// ── VISTA POR FUNCAO ─────────────────────────────────────────────────────────
function tagFor(s,d){
  if(s.state==='muda')return '<span class="tag" style="background:'+d.cb+';color:'+d.ct+'">muda</span>';
  if(s.state==='keep')return '<span class="tag-keep">mantém</span>';
  return '';
}
function deptBlock(d,it,states,big){
  var s=states[d.k][it.id]||{action:'',state:'none'};
  var act=s.action||'—';
  var dim=s.state==='none'||s.state==='keep';
  var size=big?28:22;
  return '<div class="card" style="margin:0;border-top:4px solid '+d.ac+';border-radius:10px;padding:13px 15px;'+(dim?'opacity:.6':'')+'">'
    +'<div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:800;color:'+d.dk+'">'+d.label.toUpperCase()+'</span>'+tagFor(s,d)+'</div>'
    +'<div style="font-size:'+size+'px;font-weight:800;line-height:1.15;margin-top:6px">'+esc(act)+'</div></div>';
}
function renderRole(){
  var sel=selDepts.map(deptByKey).filter(Boolean);
  var items=itemsList();
  if(!items.length){document.getElementById('cardWrap').innerHTML='<div class="cards"><div class="card" style="text-align:center;color:var(--muted)">Sem items neste dia.</div></div>';return;}
  var states={}; sel.forEach(function(d){states[d.k]=roleStates(items,d);});
  var li=liveIndexIn(items);
  var nowIt=li>=0?items[li]:null;
  var nextIt=li>=0?items[li+1]:items[0];
  var nowNum=li>=0?li+1:0;
  var cols=sel.length>=2?'1fr 1fr':'1fr';
  var h='<div class="cards">';

  h+='<div class="clabel">A decorrer'+(nowIt?'':' · à espera')+'</div>';
  if(nowIt){
    h+='<div class="card now" style="padding:14px 16px">';
    h+=ctxLine(nowIt,nowNum);
    h+='<div class="prog-bar" style="margin:0 0 12px"><div class="prog-fill" id="pf_live" style="width:'+nowPct(nowIt)+'%"></div></div>';
    h+='<div style="display:grid;grid-template-columns:'+cols+';gap:10px">';
    sel.forEach(function(d){h+=deptBlock(d,nowIt,states,sel.length===1);});
    h+='</div></div>';
  } else {
    h+='<div class="card" style="text-align:center;color:var(--muted);padding:22px">À espera do início do show.</div>';
  }

  if(nextIt){
    h+='<div class="clabel">A seguir · prepara</div>';
    h+='<div style="display:grid;grid-template-columns:'+cols+';gap:10px;margin-bottom:16px">';
    sel.forEach(function(d){
      var s=states[d.k][nextIt.id]||{action:'',state:'none'};
      var act=s.action||'—';
      var dim=s.state!=='muda';
      var tg=s.state==='muda'?'prepara':s.state==='keep'?'mantém':'nada';
      h+='<div class="card" style="margin:0;border-left:4px solid '+d.ac+';border-radius:10px;padding:11px 14px;'+(dim?'opacity:.6':'')+'">'
        +'<div style="font-size:11px;font-weight:800;color:'+d.dk+'">'+d.label.toUpperCase()+' · '+tg+'</div>'
        +'<div style="font-size:17px;font-weight:800;margin-top:3px">'+esc(act)+'</div></div>';
    });
    h+='</div>';
  }

  h+='<div class="clabel">Próximas</div>';
  h+=upcomingRole(nextIt,sel,states);
  h+='</div>';
  document.getElementById('cardWrap').innerHTML=h;
}

function upcomingRole(afterIt,sel,states){
  if(!afterIt)return '<div style="color:var(--muted);font-size:13px;padding:6px 2px">Fim do alinhamento.</div>';
  var start=rowIndexOf(afterIt.id);
  var h='',count=0;
  for(var i=start+1;i<rows.length;i++){
    var r=rows[i];
    if(r.type==='sec'){ if(!onlyMine)h+='<div style="font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:'+esc(r.color||'#4361ee')+';margin:12px 2px 5px">'+esc(r.name||'')+'</div>'; continue; }
    var qualifies=sel.some(function(d){var s=states[d.k][r.id];return s&&s.state!=='none';});
    if(onlyMine&&!qualifies)continue;
    count++;
    h+='<div class="card" style="padding:10px 14px;margin-bottom:6px">';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:13px;font-family:Courier New,monospace;color:var(--muted)">'+(r.start||'--:--')+'</span><span style="font-size:14px;font-weight:700">'+esc(r.name||'')+'</span></div>';
    sel.forEach(function(d){
      var s=states[d.k][r.id]||{action:'',state:'none'};
      var act=s.action||'—';
      var dim=s.state==='none'||s.state==='keep';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;'+(dim?'opacity:.5':'')+'">'
        +'<span style="width:8px;height:8px;border-radius:2px;background:'+d.ac+';flex-shrink:0"></span>'
        +'<span style="font-size:12px;font-weight:700;color:'+d.dk+';width:46px;flex-shrink:0">'+d.label+'</span>'
        +'<span style="font-size:14px;flex:1;min-width:0">'+esc(act)+'</span>'
        +tagFor(s,d)+'</div>';
    });
    h+='</div>';
  }
  if(!count)h+='<div style="color:var(--muted);font-size:13px;padding:6px 2px">Sem mais cues para os departamentos escolhidos.</div>';
  return h;
}

// ── ESTATISTICAS ─────────────────────────────────────────────────────────────
function updateStats(){
  var n=0,total=0,first=null;
  rows.forEach(function(r){if(r.type==='item'){n++;total+=r.dur||0;if(!first&&r.start)first=r.start;}});
  document.getElementById('stN').textContent=n;
  if(first){var p=first.split(':'),wm=parseInt(p[0]||0)*60+parseInt(p[1]||0)+total;document.getElementById('stW').textContent=String(Math.floor(wm/60)%24).padStart(2,'0')+':'+String(wm%60).padStart(2,'0');}
}

// ── RELOGIO + PROGRESSO ──────────────────────────────────────────────────────
setInterval(function(){
  var now=new Date();
  document.getElementById('clkTod').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  var clkItem=document.getElementById('clkItem');
  if(liveCue&&liveItemStart){
    var el=Math.floor((Date.now()-liveItemStart)/1000);
    var hh=Math.floor(el/3600),mm=Math.floor((el%3600)/60),ss=el%60;
    clkItem.textContent=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
    var r=null;for(var i=0;i<rows.length;i++){if(rows[i].id===liveCue){r=rows[i];break;}}
    if(r&&r.dur){
      var durSec=(r.dur||0)*60,remaining=durSec-el;
      if(el>=durSec)clkItem.className='timer-val overtime';
      else if(remaining<=60)clkItem.className='timer-val amber';
      else clkItem.className='timer-val green';
      var pct=Math.min(el/durSec*100,100).toFixed(1);
      var pf=document.getElementById('pf_'+liveCue);if(pf)pf.style.width=pct+'%';
      var pfl=document.getElementById('pf_live');if(pfl)pfl.style.width=pct+'%';
      var rem=document.getElementById('now_rem');
      if(rem){var rs=Math.max(0,Math.round(remaining));rem.textContent=(el>=durSec?'+':'falta ')+String(Math.floor(rs/60)).padStart(2,'0')+':'+String(rs%60).padStart(2,'0');}
    }
  } else {
    clkItem.textContent='00:00:00';clkItem.className='timer-val green';
  }
},1000);

// ── ARRANQUE ─────────────────────────────────────────────────────────────────
function initFromParams(p){
  var v=(p['view']||'').toLowerCase();
  if(v==='table'||v==='tabela')viewMode='table';
  else if(v==='caller'||v==='showcaller')viewMode='caller';
  var role=p['role']||'';
  if(role){
    var map={SND:'som',LGT:'luz',VID:'video',CAM:'video',STG:'palco',MIC:'micro',ECR:'ecras'};
    role.split(',').forEach(function(tok){
      tok=tok.trim();var k=null;
      if(deptByKey(tok.toLowerCase()))k=tok.toLowerCase();
      else if(map[tok.toUpperCase()])k=map[tok.toUpperCase()];
      if(k&&selDepts.indexOf(k)<0&&selDepts.length<3)selDepts.push(k);
    });
    if(selDepts.length)viewMode='role';
  }
}

window.addEventListener('load',function(){
  var params=getParams();
  GAS_URL=params['gas']||'';
  SHOW_ID=params['show']||'';
  if(!GAS_URL||!SHOW_ID){
    document.getElementById('loadMsg').innerHTML='&#9888; Link invalido.<br><small style="color:var(--muted)">Usa o link enviado pelo show caller.</small>';
    return;
  }
  initFromParams(params);
  fetchData();
  startRealtime();
});
</script>
